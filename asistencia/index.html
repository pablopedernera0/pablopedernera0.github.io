<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Asistencia</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f4ff;
            min-height: 100vh;
            padding: 24px 16px;
        }

        /* ---- Header ---- */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .header h1 {
            font-size: 1.5rem;
            color: #2d3282;
            font-weight: 700;
        }
        .header .subtitulo {
            font-size: 0.9rem;
            color: #888;
            margin-top: 4px;
        }
        .badge-fecha {
            display: inline-block;
            background: #e8ebff;
            color: #2d3282;
            border-radius: 20px;
            padding: 6px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 10px;
        }

        /* ---- Card ---- */
        .card {
            background: white;
            border-radius: 18px;
            padding: 24px;
            max-width: 480px;
            margin: 0 auto 16px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.07);
        }

        /* ---- Inputs ---- */
        label {
            display: block;
            font-size: 0.85rem;
            color: #555;
            font-weight: 600;
            margin-bottom: 6px;
        }
        input[type=text], input[type=date], input[type=password] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e4f0;
            border-radius: 12px;
            font-size: 1rem;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }
        input:focus { border-color: #3b3f8c; }

        /* ---- Botones ---- */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            cursor: pointer;
            font-weight: 700;
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn-primary { background: #3b3f8c; color: white; }
        .btn-primary:disabled { background: #aaa; cursor: not-allowed; transform: none; }

        /* ---- Mensajes ---- */
        .msg {
            text-align: center;
            margin-top: 14px;
            font-size: 0.95rem;
            padding: 12px;
            border-radius: 10px;
            display: none;
        }
        .msg.ok    { background: #e6ffed; color: #1a7a3a; display: block; }
        .msg.error { background: #fff0f0; color: #c0392b; display: block; }
        .msg.info  { background: #f0f4ff; color: #3b3f8c; display: block; }

        /* ---- Lista de alumnos ---- */
        #seccion-lista { max-width: 480px; margin: 0 auto; }
        .lista { display: flex; flex-direction: column; gap: 10px; }
        .btn-alumno {
            background: white;
            border: 2px solid #dde2ff;
            border-radius: 14px;
            padding: 18px 20px;
            font-size: 1.05rem;
            color: #222;
            cursor: pointer;
            text-align: left;
            transition: background 0.15s, border-color 0.15s;
            width: 100%;
        }
        .btn-alumno:hover  { background: #eef0ff; border-color: #3b3f8c; }
        .btn-alumno:active { transform: scale(0.98); }

        /* ---- Modal de confirmación ---- */
        .overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            align-items: flex-end;
            justify-content: center;
            z-index: 100;
            padding: 0;
        }
        .overlay.visible { display: flex; }
        .modal {
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 32px 24px 40px;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        .modal-handle {
            width: 40px; height: 4px;
            background: #ddd;
            border-radius: 2px;
            margin: 0 auto 24px;
        }
        .modal h2 { color: #2d3282; margin-bottom: 8px; font-size: 1.25rem; }
        .modal .nombre-modal {
            font-size: 1.15rem;
            font-weight: 700;
            color: #222;
            margin-bottom: 28px;
            padding: 14px;
            background: #f0f4ff;
            border-radius: 12px;
        }
        .modal-btns { display: flex; gap: 12px; }
        .btn-confirmar {
            flex: 2;
            background: #3b3f8c; color: white;
            border: none; border-radius: 14px;
            padding: 16px; font-size: 1rem;
            font-weight: 700; cursor: pointer;
        }
        .btn-cancelar {
            flex: 1;
            background: #f0f0f0; color: #555;
            border: none; border-radius: 14px;
            padding: 16px; font-size: 1rem;
            cursor: pointer;
        }

        /* ---- Pantalla resultado ---- */
        .resultado {
            display: none;
            position: fixed; inset: 0;
            background: #2d3282;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            text-align: center;
            padding: 40px 24px;
            z-index: 200;
        }
        .resultado.visible { display: flex; }
        .resultado.error-bg { background: #8c2d2d; }
        .resultado .icono { font-size: 5rem; margin-bottom: 20px; }
        .resultado .res-msg { font-size: 1.4rem; font-weight: 700; }
        .resultado .res-sub { font-size: 1rem; opacity: 0.8; margin-top: 10px; }

        /* ---- Loading spinner ---- */
        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
            font-size: 0.95rem;
        }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid #e0e4f0;
            border-top-color: #3b3f8c;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ---- Panel docente ---- */
        .docente-badge {
            text-align: center;
            background: #fff8e6;
            color: #7a5800;
            border-radius: 10px;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>

<!-- ===== VISTA ALUMNOS ===== -->
<div id="vista-alumnos">
    <div class="header">
        <h1>📋 Marcar Asistencia</h1>
        <div class="subtitulo">Ingresá la clave que te dio el docente</div>
    </div>

    <div class="card" id="card-clave">
        <label for="clave-alumno">Clave del día</label>
        <input type="password" id="clave-alumno" placeholder="Ingresá la clave..."
               autocomplete="off" inputmode="text"
               onkeydown="if(event.key==='Enter') verificar()">
        <button class="btn btn-primary" onclick="verificar()" id="btn-verificar">Entrar</button>
        <div class="msg" id="msg-clave"></div>
    </div>

    <div id="seccion-lista" style="display:none">
        <div class="header">
            <div class="badge-fecha" id="badge-fecha"></div>
            <div class="subtitulo" style="margin-top:12px">Tocá tu nombre para registrar tu asistencia</div>
        </div>
        <div class="lista" id="lista">
            <div class="loading">
                <div class="spinner"></div>
                Cargando alumnos...
            </div>
        </div>
    </div>
</div>

<!-- ===== VISTA DOCENTE ===== -->
<div id="vista-docente" style="display:none">
    <div class="docente-badge">⚙️ Modo docente</div>
    <div class="header">
        <h1>Activar sesión</h1>
        <div class="subtitulo">Configurá la clase antes de que lleguen los alumnos</div>
    </div>
    <div class="card">
        <label for="fecha-docente">Fecha de la clase</label>
        <input type="date" id="fecha-docente">
        <label for="clave-docente">Clave del día</label>
        <input type="text" id="clave-docente"
               placeholder="Ej: AZUL47"
               autocomplete="off"
               style="text-transform:uppercase"
               oninput="this.value=this.value.toUpperCase()"
               onkeydown="if(event.key==='Enter') activar()">
        <button class="btn btn-primary" onclick="activar()" id="btn-activar">Activar sesión</button>
        <div class="msg" id="msg-docente"></div>
    </div>
</div>

<!-- ===== MODAL CONFIRMACIÓN ===== -->
<div class="overlay" id="overlay" onclick="if(event.target===this) cerrar()">
    <div class="modal">
        <div class="modal-handle"></div>
        <h2>¿Sos vos?</h2>
        <div class="nombre-modal" id="modal-nombre"></div>
        <div class="modal-btns">
            <button class="btn-cancelar" onclick="cerrar()">Cancelar</button>
            <button class="btn-confirmar" onclick="confirmar()">Sí, soy yo ✓</button>
        </div>
    </div>
</div>

<!-- ===== PANTALLA RESULTADO ===== -->
<div class="resultado" id="resultado">
    <div class="icono" id="res-icono"></div>
    <div class="res-msg" id="res-mensaje"></div>
    <div class="res-sub" id="res-sub"></div>
</div>

<script>
    // ============================================================
    // CONFIGURACIÓN — reemplazá con tu URL del script
    // ============================================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwuXuYDsH7mXd9xGyjLeq9pBqWq4l4SyGweo-ILDtZIoa9mAQ750Vn4maFG1WTYOgd5ww/exec";

    // ============================================================
    // INIT
    // ============================================================
    let claveActiva = "";
    let filaSeleccionada = null;

    // Detectar modo docente por parámetro URL
    const params = new URLSearchParams(window.location.search);
    if (params.get("modo") === "docente") {
        document.getElementById("vista-alumnos").style.display = "none";
        document.getElementById("vista-docente").style.display = "block";
        // Fecha de hoy por defecto
        const hoy = new Date();
        const yyyy = hoy.getFullYear();
        const mm = String(hoy.getMonth() + 1).padStart(2, "0");
        const dd = String(hoy.getDate()).padStart(2, "0");
        document.getElementById("fecha-docente").value = `${yyyy}-${mm}-${dd}`;
    }

    // ============================================================
    // ALUMNO — verificar clave
    // ============================================================
    async function verificar() {
        const clave = document.getElementById("clave-alumno").value.trim();
        const msg = document.getElementById("msg-clave");
        const btn = document.getElementById("btn-verificar");

        if (!clave) { showMsg(msg, "Ingresá la clave.", "error"); return; }

        btn.disabled = true;
        btn.textContent = "Verificando...";
        showMsg(msg, "Verificando...", "info");

        try {
            const res = await post({ accion: "verificar", clave });
            if (res.ok) {
                claveActiva = clave;
                document.getElementById("card-clave").style.display = "none";
                document.getElementById("seccion-lista").style.display = "block";
                document.getElementById("badge-fecha").textContent = "📅 Clase del " + res.fecha;
                cargarAlumnos();
            } else {
                showMsg(msg, res.msg, "error");
                btn.disabled = false;
                btn.textContent = "Entrar";
            }
        } catch {
            showMsg(msg, "Error de conexión. Revisá el WiFi.", "error");
            btn.disabled = false;
            btn.textContent = "Entrar";
        }
    }

    // ============================================================
    // ALUMNO — cargar lista
    // ============================================================
    async function cargarAlumnos() {
        const lista = document.getElementById("lista");
        lista.innerHTML = `<div class="loading"><div class="spinner"></div>Cargando alumnos...</div>`;

        try {
            const res = await fetch(SCRIPT_URL + "?accion=alumnos");
            const data = await res.json();
            renderLista(data);
        } catch {
            lista.innerHTML = `<div class="loading">Error al cargar la lista. Recargá la página.</div>`;
        }
    }

    function renderLista(alumnos) {
        const lista = document.getElementById("lista");
        if (!alumnos.length) {
            lista.innerHTML = `<div class="loading">No hay alumnos cargados en la hoja.</div>`;
            return;
        }
        lista.innerHTML = alumnos
            .map(a => `<button class="btn-alumno" onclick="seleccionar(${a.fila}, '${a.nombre.replace(/'/g, "\\'")}')">
        ${a.nombre}
      </button>`)
            .join("");
    }

    // ============================================================
    // ALUMNO — seleccionar y confirmar
    // ============================================================
    function seleccionar(fila, nombre) {
        filaSeleccionada = fila;
        document.getElementById("modal-nombre").textContent = nombre;
        document.getElementById("overlay").classList.add("visible");
    }

    function cerrar() {
        document.getElementById("overlay").classList.remove("visible");
        filaSeleccionada = null;
    }

    async function confirmar() {
        cerrar();
        try {
            const res = await post({ accion: "marcar", fila: filaSeleccionada, clave: claveActiva });
            mostrarResultado(res.ok, res.msg, res.ok ? "Tu asistencia quedó registrada ✓" : "");
        } catch {
            mostrarResultado(false, "Error de conexión", "Intentá de nuevo");
        }
    }

    // ============================================================
    // DOCENTE — activar sesión
    // ============================================================
    async function activar() {
        const fecha = document.getElementById("fecha-docente").value;
        const clave = document.getElementById("clave-docente").value.trim();
        const msg = document.getElementById("msg-docente");
        const btn = document.getElementById("btn-activar");

        if (!fecha || !clave) { showMsg(msg, "Completá fecha y clave.", "error"); return; }

        btn.disabled = true;
        btn.textContent = "Activando...";

        try {
            const res = await post({ accion: "activar", clave, fecha });
            showMsg(msg, res.msg, res.ok ? "ok" : "error");
        } catch {
            showMsg(msg, "Error de conexión.", "error");
        } finally {
            btn.disabled = false;
            btn.textContent = "Activar sesión";
        }
    }

    // ============================================================
    // HELPERS
    // ============================================================
    async function post(body) {
        const res = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify(body)
        });
        return res.json();
    }

    function showMsg(el, texto, tipo) {
        el.textContent = texto;
        el.className = "msg " + tipo;
    }

    function mostrarResultado(ok, mensaje, sub) {
        const el = document.getElementById("resultado");
        document.getElementById("res-icono").textContent = ok ? "✅" : "⚠️";
        document.getElementById("res-mensaje").textContent = mensaje;
        document.getElementById("res-sub").textContent = sub;
        el.className = "resultado visible" + (ok ? "" : " error-bg");
        setTimeout(() => { el.className = "resultado"; }, 3000);
    }
</script>
</body>
</html>
